<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Cheseto Restaurant - Mobile POS App</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar Kiri - Navigation -->
        <aside class="sidebar">
            <div class="logo">
                <i class="fas fa-utensils"></i>
                <span>Cheseto</span>
            </div>
            <nav class="nav-menu">
                <a href="#" class="nav-item active" data-page="home">
                    <i class="fas fa-home"></i>
                    <span>Home</span>
                </a>
                <a href="#" class="nav-item" data-page="takeaway">
                    <i class="fas fa-bag-shopping"></i>
                    <span>Take Away</span>
                </a>
                <a href="#" class="nav-item" data-page="history">
                    <i class="fas fa-clock"></i>
                    <span>History</span>
                </a>
                <a href="#" class="nav-item" data-page="report">
                    <i class="fas fa-chart-line"></i>
                    <span>Report</span>
                </a>
                <a href="#" class="nav-item" data-page="alert">
                    <i class="fas fa-bell"></i>
                    <span>Alert</span>
                </a>
                <a href="#" class="nav-item" data-page="settings">
                    <i class="fas fa-cog"></i>
                    <span>Settings</span>
                </a>
            </nav>
            <div class="profile-section">
                <img src="https://ui-avatars.com/api/?background=FF6B35&color=fff&name=Chef" alt="Profile">
                <div class="profile-info">
                    <h4>Chef Cheseto</h4>
                    <p>Admin</p>
                </div>
            </div>
        </aside>

        <!-- Konten Utama -->
        <main class="main-content">
            <!-- Header Pencarian -->
            <div class="search-header">
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" placeholder="Search category or menu" id="searchInput">
                </div>
                <div class="stock-warning">
                    <i class="fas fa-exclamation-triangle"></i>
                    <span id="outOfStockCount">5</span> items out of stocks
                </div>
            </div>

            <!-- Tab Kategori -->
            <div class="category-tabs" id="categoryTabs">
                <button class="cat-tab active" data-cat="all">All</button>
                <button class="cat-tab" data-cat="Pizza">Pizza</button>
                <button class="cat-tab" data-cat="Burger">Burger</button>
                <button class="cat-tab" data-cat="Rice">Rice</button>
                <button class="cat-tab" data-cat="Snacks">Snacks</button>
                <button class="cat-tab" data-cat="Drinks">Drinks</button>
            </div>

            <!-- Area Menu & Order (2 kolom) -->
            <div class="pos-layout">
                <!-- Kolom Kiri: Daftar Menu -->
                <div class="menu-section">
                    <div class="section-title">
                        <h3>Choose <span id="activeCategoryName">Pizza</span></h3>
                        <span id="menuResultCount">10</span> Pizza Result
                    </div>
                    <div class="menu-grid" id="menuGrid">
                        <!-- Menu akan di-render oleh JS -->
                    </div>
                </div>

                <!-- Kolom Kanan: Keranjang Order -->
                <div class="cart-section">
                    <div class="cart-header">
                        <h3><i class="fas fa-receipt"></i> Current Orders</h3>
                        <div class="table-info">
                            <span>Table</span>
                            <strong id="tableNumber">#907653</strong>
                            <span>T1</span>
                        </div>
                    </div>
                    <div class="cart-items" id="cartItems">
                        <!-- Item keranjang -->
                    </div>
                    <div class="cart-summary">
                        <div class="summary-row">
                            <span>items(<span id="totalItems">0</span>)</span>
                            <span>$<span id="subtotalAmount">0.00</span></span>
                        </div>
                        <div class="summary-row">
                            <span>Tax (10%)</span>
                            <span>$<span id="taxAmount">0.00</span></span>
                        </div>
                        <div class="summary-row total">
                            <span>Total</span>
                            <span>$<span id="totalAmount">0.00</span></span>
                        </div>
                        <button class="btn-print" id="printBillBtn">
                            <i class="fas fa-print"></i> Print Bills
                        </button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Toast Notifikasi -->
    <div id="toast" class="toast">Item ditambahkan ke order</div>

    <script src="script.js"></script>
</body>
</html>
